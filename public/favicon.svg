<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="7" fill="#0d0d11"/>
  <!-- Flask outline (Erlenmeyer shape) -->
  <path d="M 14 4 L 18 4 L 18 13 L 24.5 23.5 Q 25.5 28.5 16 28.5 Q 6.5 28.5 7.5 23.5 L 14 13 Z"
        fill="rgba(16,185,129,0.07)"
        stroke="#10b981"
        stroke-width="1.7"
        stroke-linejoin="round"
        stroke-linecap="round"/>
  <!-- Shoulder divider -->
  <line x1="12.5" y1="13" x2="19.5" y2="13"
        stroke="#10b981" stroke-width="1.4" stroke-linecap="round" opacity="0.5"/>
  <!-- Liquid fill -->
  <path d="M 9.2 23.2 Q 8.5 28.5 16 28.5 Q 23.5 28.5 22.8 23.2 Z"
        fill="rgba(16,185,129,0.48)"/>
  <!-- Bubbles -->
  <circle cx="13.2" cy="21.2" r="1.4" fill="rgba(16,185,129,0.72)"/>
  <circle cx="19.2" cy="18.8" r="0.9" fill="rgba(16,185,129,0.55)"/>
</svg>
